name: building

on:
  push:
  release:
    types: [published]

jobs:

  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: [3.8, 3.9, "3.10", "3.11", "3.12", "3.13"]
        pandas: [
          pandas==2.0.0,
          pandas==2.1.4,
          pandas==2.2.3,
          pandas==2.3.0,
          pandas==3.0.0,
          pandas  # latest pandas for the specific python version
        ]
        # available combinations
        # python3.8 -> pandas 2.0.x
        # python3.9 -> pandas 2.1.x, 2.2.x, 2.3.x
        # python3.10 -> pandas 2.1.x, 2.2.x, 2.3.x
        # python3.11 -> pandas 2.1.x, 2.2.x, 2.3.x, 3.0.x
        # python3.12 -> pandas 2.1.x, 2.2.x, 2.3.x, 3.0.x
        # python3.13 -> pandas 2.1.x, 2.2.x, 2.3.x, 3.0.x
        exclude:
          - python-version: 3.8
            pandas: pandas==2.1.4
          - python-version: 3.8
            pandas: pandas==2.2.3
          - python-version: 3.8
            pandas: pandas==2.3.0
          - python-version: 3.8
            pandas: pandas==3.0.0
          - python-version: 3.9
            pandas: pandas==2.0.0
          - python-version: 3.9
            pandas: pandas==3.0.0
          - python-version: "3.10"
            pandas: pandas==2.0.0
          - python-version: "3.10"
            pandas: pandas==3.0.0
          - python-version: 3.11
            pandas: pandas==2.0.0
          - python-version: 3.12
            pandas: pandas==2.0.0
          - python-version: 3.13
            pandas: pandas==2.0.0
          - python-version: 3.13
            pandas: pandas==2.1.4

    steps:
      - uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v8.0.0
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          uv sync --group dev
          uv pip install --upgrade "$PANDAS"
        env:
          PANDAS: ${{ matrix.pandas }}
      - name: Test with pytest
        run: uv run pytest tests/ --junitxml=junit/test-results-${{ matrix.python-version }}.xml
      - name: Upload pytest test results
        uses: actions/upload-artifact@v7
        with:
          name: pytest-results-${{ matrix.python-version }}-${{ matrix.pandas }}
          path: junit/test-results-${{ matrix.python-version }}-${{ matrix.pandas }}.xml
        # Use always() to always run this step to publish test results when there are test failures
        if: ${{ always() }}
      - name: Run codacy-coverage-reporter
        uses: codacy/codacy-coverage-reporter-action@master
        if: matrix.python-version == 3.12
        with:
          project-token: ${{ secrets.CODACY_PROJECT_TOKEN }}
          coverage-reports: cov.xml

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    strategy:
      matrix:
        python-version: ["3.12"]
    steps:
      - uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v8.0.0
      - name: Publish to PyPI
        run: uv build && uv publish --username ${{ secrets.PYPI_USER }} --password ${{ secrets.PYPI_PASSWORD }}
        if: success()
